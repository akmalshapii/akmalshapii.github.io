---
layout: default
---

<article class="post">

    <div class="post-hero">
        <div class="post-meta-top">
            <a href="{{ '/writings' | relative_url }}" class="post-back">← Writings</a>
            <span class="post-date">{{ page.date | date: "%b %-d, %Y" }}</span>
        </div>
        <h1 class="post-title">{{ page.title }}</h1>
        {% if page.excerpt %}
        <p class="post-excerpt">{{ page.excerpt }}</p>
        {% endif %}
        {% if page.tags %}
        <div class="post-tags">
            {% for tag in page.tags %}
            <span class="project-tag">{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="post-body">
        {{ content }}
    </div>

</article>
